<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app-hero.jsx"></script>
<script type="text/babel" src="app-tweaks.jsx"></script>
<script type="text/babel">
  function Footer() {
    return (
      <footer className="footer">
        <div className="footer__inner">
          <div>
            <img src="assets/logo-rukcon11-allin.png" alt="RUKCON 11 — All In" style={{ height: 64, marginBottom: 20 }} />
            <p style={{ fontSize: 14, lineHeight: 1.6, maxWidth: '28ch', margin: 0, color: 'rgba(255,255,255,0.55)' }}>
              The largest faith-based personal development organization in America.
            </p>
          </div>
          <div>
            <h5>Event</h5>
            <ul>
              <li><a href="#pillars">Four Pillars</a></li>
              <li><a href="#schedule">Schedule</a></li>
              <li><a href="#speakers">Speakers</a></li>
              <li><a href="#tickets">Tickets</a></li>
              <li><a href="#venue">Venue</a></li>
            </ul>
          </div>
          <div>
            <h5>Get Involved</h5>
            <ul>
              <li><a href="#freedom">Freedom (Women)</a></li>
              <li><a href="#more-ways">Sponsorship</a></li>
              <li><a href="mailto:carolyn@riseupkings.com?subject=RUKCON%2011%20%E2%80%94%20Speaker%20Pitch">Speak</a></li>
              <li><a href="mailto:carolyn@riseupkings.com?subject=RUKCON%2011%20%E2%80%94%20Volunteer%20Application">Volunteer</a></li>
            </ul>
          </div>
          <div>
            <h5>Resources</h5>
            <ul>
              <li><a href="#faq">FAQ</a></li>
              <li><a href="https://www.riseupkings.com" target="_blank" rel="noopener noreferrer">Rise Up Kings</a></li>
              <li><a href="https://go.riseupqueens.com/3dayevent" target="_blank" rel="noopener noreferrer">Rise Up Queens</a></li>
              <li><a href="mailto:carolyn@riseupkings.com">Contact</a></li>
            </ul>
          </div>
        </div>
        <div className="footer__legal">
          <span>© 2026 Rise Up Kings. All rights reserved.</span>
          <span>RUKCON 11 · Sept 16–18, 2026 · Dallas, TX</span>
        </div>
      </footer>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <React.Fragment>
      <Nav />
      <Hero />
      <S1AllInAgain />
      <S2WhoFor />
      <S3Pillars />
      <S4ThreeDays />
      <S5Freedom />
      <S6Speakers />
      <S7Outcomes />
      <S8Testimonials />
      <S9SkylarLetter />
      <S10Tickets />
      <S11Venue />
      <S12FAQ />
      <S13MoreWays />
      <S14FinalCTA />
      <Footer />
      <TweaksApp />
    </React.Fragment>
  );

  // Scroll-based reveals via IntersectionObserver
  setTimeout(() => {
    const reveals = document.querySelectorAll('.reveal');
    if ('IntersectionObserver' in window) {
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('is-visible');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
      reveals.forEach(el => io.observe(el));
    } else {
      reveals.forEach(el => el.classList.add('is-visible'));
    }
  }, 100);
</script>
</body>
